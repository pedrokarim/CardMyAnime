version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: cardmyanime-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cardmyanime}
      - POSTGRES_USER=${POSTGRES_USER:-cardmyanime}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cardmyanime123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardmyanime} -d ${POSTGRES_DB:-cardmyanime}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cardmyanime-network

  cardmyanime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardmyanime-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cardmyanime}:${POSTGRES_PASSWORD:-cardmyanime123}@postgres:5432/${POSTGRES_DB:-cardmyanime}?schema=public
      - DIRECT_URL=postgresql://${POSTGRES_USER:-cardmyanime}:${POSTGRES_PASSWORD:-cardmyanime123}@postgres:5432/${POSTGRES_DB:-cardmyanime}?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
    env_file:
      - .env
    # Configuration pour la santé de l'application
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Limites de ressources
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # Volumes pour les logs uniquement
    volumes:
      - ./logs:/app/logs
    # Réseau
    networks:
      - cardmyanime-network

networks:
  cardmyanime-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
